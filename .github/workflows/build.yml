name: Build PhoenixOS ISO

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ── S language compiler (host-only, no cross-compiler needed) ───────────────
  sc-compiler:
    name: Build S compiler & run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sc compiler
        run: make -C tools/s-lang

      - name: Transpile examples
        run: |
          cd tools/s-lang
          ./sc examples/hello.s       --emit-c > /dev/null
          ./sc examples/fibonacci.s   --emit-c > /dev/null
          ./sc examples/kernel-demo.s --emit-c > /dev/null
          echo "All examples transpile OK"

      - name: Build and run examples
        run: make -C tools/s-lang examples test

      - name: Run sc unit tests
        run: |
          cd tools/s-lang/tests
          gcc -O2 -Wall -std=c11 -o test_sc test_sc.c
          ./test_sc ../sc

  # ── Kernel unit tests (host compiler, no cross-compiler needed) ─────────────
  kernel-tests:
    name: Kernel unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run kernel unit tests
        run: make test

  # ── Full OS build (requires cross-compiler) ──────────────────────────────────
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            e2fsprogs \
            parted \
            wget \
            flex \
            bison \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo

      # ── Cross-compiler cache ───────────────────────────────────────────────
      - name: Cache x86_64-elf cross-compiler
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/opt/cross
          key: cross-x86_64-elf-binutils-2.41-gcc-13.2.0-v1

      - name: Build x86_64-elf cross-compiler
        if: steps.cache-cross.outputs.cache-hit != 'true'
        env:
          PREFIX: ${{ github.workspace }}/opt/cross
        run: |
          set -e
          TARGET="x86_64-elf"
          BINUTILS_VERSION="2.41"
          GCC_VERSION="13.2.0"
          BUILD_DIR="$(mktemp -d /tmp/cross-build.XXXXXX)"

          export PATH="$PREFIX/bin:$PATH"
          mkdir -p "$PREFIX"
          cd "$BUILD_DIR"

          echo "Downloading binutils $BINUTILS_VERSION..."
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz" -O binutils.tar.xz
          tar -xf binutils.tar.xz

          echo "Building binutils..."
          mkdir build-binutils && cd build-binutils
          "$BUILD_DIR/binutils-${BINUTILS_VERSION}/configure" \
            --target="$TARGET" --prefix="$PREFIX" \
            --with-sysroot --disable-nls --disable-werror
          make -j"$(nproc)"
          make install
          cd "$BUILD_DIR"

          echo "Downloading GCC $GCC_VERSION..."
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz" -O gcc.tar.xz
          tar -xf gcc.tar.xz
          cd "gcc-${GCC_VERSION}"
          ./contrib/download_prerequisites
          cd "$BUILD_DIR"

          echo "Building GCC..."
          mkdir build-gcc && cd build-gcc
          "$BUILD_DIR/gcc-${GCC_VERSION}/configure" \
            --target="$TARGET" --prefix="$PREFIX" \
            --disable-nls --enable-languages=c,c++ \
            --without-headers --disable-hosted-libstdcxx
          make -j"$(nproc)" all-gcc
          make -j"$(nproc)" all-target-libgcc
          make install-gcc
          make install-target-libgcc
          cd /
          rm -rf "$BUILD_DIR"

          echo "Cross-compiler built successfully"
          "$PREFIX/bin/x86_64-elf-gcc" --version

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Add cross-compiler to PATH
        run: echo "${{ github.workspace }}/opt/cross/bin" >> "$GITHUB_PATH"

      - name: Build S compiler
        run: make sc

      - name: Build runtime libraries
        run: make libs

      - name: Build kernel
        run: make kernel -j"$(nproc)"

      - name: Build userspace
        run: make userspace -j"$(nproc)"

      - name: Build desktop
        run: make desktop -j"$(nproc)"

      - name: Create bootable ISO
        run: make iso

      # ── Artifact ───────────────────────────────────────────────────────────
      - name: Upload phoenix.iso
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixOS-ISO
          path: phoenix.iso
          if-no-files-found: error
          retention-days: 30
