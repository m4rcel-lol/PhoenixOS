name: Build PhoenixOS VM Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-vm-image:
    name: Build VM Image (VirtualBox / VMware)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            e2fsprogs \
            parted \
            wget \
            flex \
            bison \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo \
            qemu-utils

      # ── Cross-compiler cache (shared with main build workflow) ─────────────
      - name: Cache x86_64-elf cross-compiler
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/opt/cross
          key: cross-x86_64-elf-binutils-2.41-gcc-13.2.0-v1

      - name: Build x86_64-elf cross-compiler
        if: steps.cache-cross.outputs.cache-hit != 'true'
        env:
          PREFIX: ${{ github.workspace }}/opt/cross
        run: |
          set -e
          TARGET="x86_64-elf"
          BINUTILS_VERSION="2.41"
          GCC_VERSION="13.2.0"
          BUILD_DIR="$(mktemp -d /tmp/cross-build.XXXXXX)"

          export PATH="$PREFIX/bin:$PATH"
          mkdir -p "$PREFIX"
          cd "$BUILD_DIR"

          echo "Downloading binutils $BINUTILS_VERSION..."
          wget -q "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz" -O binutils.tar.xz
          tar -xf binutils.tar.xz

          echo "Building binutils..."
          mkdir build-binutils && cd build-binutils
          "$BUILD_DIR/binutils-${BINUTILS_VERSION}/configure" \
            --target="$TARGET" --prefix="$PREFIX" \
            --with-sysroot --disable-nls --disable-werror
          make -j"$(nproc)"
          make install
          cd "$BUILD_DIR"

          echo "Downloading GCC $GCC_VERSION..."
          wget -q "https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz" -O gcc.tar.xz
          tar -xf gcc.tar.xz
          cd "gcc-${GCC_VERSION}"
          ./contrib/download_prerequisites
          cd "$BUILD_DIR"

          echo "Building GCC..."
          mkdir build-gcc && cd build-gcc
          "$BUILD_DIR/gcc-${GCC_VERSION}/configure" \
            --target="$TARGET" --prefix="$PREFIX" \
            --disable-nls --enable-languages=c,c++ \
            --without-headers --disable-hosted-libstdcxx
          make -j"$(nproc)" all-gcc
          make -j"$(nproc)" all-target-libgcc
          make install-gcc
          make install-target-libgcc
          cd /
          rm -rf "$BUILD_DIR"

          echo "Cross-compiler built successfully"
          "$PREFIX/bin/x86_64-elf-gcc" --version

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Add cross-compiler to PATH
        run: echo "${{ github.workspace }}/opt/cross/bin" >> "$GITHUB_PATH"

      - name: Build S compiler
        run: make sc

      - name: Build runtime libraries
        run: make libs

      - name: Build kernel
        run: make kernel -j"$(nproc)"

      - name: Build userspace
        run: make userspace -j"$(nproc)"

      - name: Build desktop
        run: make desktop -j"$(nproc)"

      - name: Create bootable ISO
        run: make iso

      - name: Verify ISO is non-empty and contains kernel
        run: |
          ISO_SIZE=$(stat -c%s phoenix.iso)
          echo "ISO size: ${ISO_SIZE} bytes"
          if [[ "$ISO_SIZE" -lt 1048576 ]]; then
            echo "ERROR: ISO is too small (${ISO_SIZE} bytes) — kernel may not have been embedded."
            exit 1
          fi
          echo "ISO size check passed."

      # ── VMDK disk image for VirtualBox / VMware ────────────────────────────
      - name: Create VMDK virtual hard-drive image
        run: sudo bash scripts/make-vm-image.sh

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload bootable ISO
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixOS-VM-ISO
          path: phoenix.iso
          if-no-files-found: error
          retention-days: 30

      - name: Upload VMDK disk image
        uses: actions/upload-artifact@v4
        with:
          name: PhoenixOS-VMDK
          path: phoenix.vmdk
          if-no-files-found: error
          retention-days: 30
