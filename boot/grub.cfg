set default=0
set timeout=5

insmod all_video
set gfxmode=auto
set gfxpayload=keep

menuentry "PhoenixOS 0.0.2 (Shell)" {
    multiboot2 /boot/ember.elf nodesktop quiet
    boot
}

menuentry "PhoenixOS 0.0.2 (Desktop)" {
    multiboot2 /boot/ember.elf quiet
    boot
}

menuentry "PhoenixOS 0.0.2 (serial debug)" {
    multiboot2 /boot/ember.elf console=serial debug
    boot
}

menuentry "PhoenixOS 0.0.2 (safe mode)" {
    multiboot2 /boot/ember.elf safemode nodesktop
    boot
}
