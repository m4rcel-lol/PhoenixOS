[theme]
name = Retro Gray
version = 1.0

[colors]
desktop_bg = #008080
window_bg = #c0c0c0
titlebar_active = #000080
titlebar_inactive = #808080
titlebar_text_active = #ffffff
titlebar_text_inactive = #c0c0c0
button_face = #c0c0c0
button_highlight = #ffffff
button_shadow = #808080
button_dark_shadow = #404040
menu_bg = #c0c0c0
menu_highlight = #000080
menu_text = #000000
menu_highlight_text = #ffffff
border_color = #808080
text_color = #000000
disabled_text = #808080

[fonts]
system = /assets/fonts/system8x16.psf
menu = /assets/fonts/system8x16.psf
title = /assets/fonts/system8x16.psf

[metrics]
border_width = 3
titlebar_height = 18
menu_height = 18
button_width = 16
button_height = 14
