[theme]
name = Mono Classic
version = 1.0

[colors]
desktop_bg = #000000
window_bg = #ffffff
titlebar_active = #000000
titlebar_inactive = #888888
titlebar_text_active = #ffffff
titlebar_text_inactive = #ffffff
button_face = #ffffff
button_highlight = #ffffff
button_shadow = #000000
button_dark_shadow = #000000
menu_bg = #ffffff
menu_highlight = #000000
menu_text = #000000
menu_highlight_text = #ffffff
border_color = #000000
text_color = #000000
disabled_text = #888888

[fonts]
system = /assets/fonts/system8x16.psf
menu = /assets/fonts/system8x16.psf
title = /assets/fonts/system8x16.psf

[metrics]
border_width = 2
titlebar_height = 18
menu_height = 18
button_width = 16
button_height = 14
